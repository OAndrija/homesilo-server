spring.application.name=homesilo-server-test

# 1. In-Memory Database (Replaces live PostgreSQL env vars)
spring.datasource.url=jdbc:h2:mem:homesilotestdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. JPA & Hibernate testing behavior 
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. Isolated Test Storage (Cleans up automatically on mvn/gradle clean)
storage.base-path=target/test-storage

# 4. Mock Security / JWT Values
# Must be >= 32 characters long
jwt.secret=superSafeAndExtremelyLongDummySecretKeyForRunningTests1234567890!
# 3600000 ms = 1 hour token life for test execution duration
jwt.expiration=3600000